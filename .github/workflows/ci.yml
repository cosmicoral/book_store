name: Continuous Integration

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:13

        env:
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_USER: runner
          POSTGRES_DB: book_store_test

        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

        ports:
          - 5432:5432

    env:
      DATABASE_NAME: book_store_test
      DATABASE_HOST: 127.0.0.1
      DATABASE_USER: runner
      DATABASE_PASSWORD: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5

        with:
          python-version: "3.13"

      - name: Install dependencies

        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Seed database
        run: |
          psql -h 127.0.0.1 -U runner book_store_test -f seeds/book_store.sql

      - name: Run tests

        run: |
          python -m pytest tests -sv 